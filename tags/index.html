---
layout: default
title: Tags
permalink: /tags/
---

<div class="tags-page">
    <div class="tag-cloud">
        {% for tag in site.tags %}
            <a href="/tags/{{ tag[0] | slugify }}" class="tag-pill">
                #{{ tag[0] }} ({{ tag[1].size }})
            </a>
        {% endfor %}
    </div>
</div>
