---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="post-meta">
            {{ page.date | date: "%d/%m/%Y" }} | {{ page.author }}
        </div>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    {% include post_tags.html %}
</article>
