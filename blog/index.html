---
layout: default
title: All Posts
---
<h1>Posts</h1>
<div class="post-list">
    {% for post in site.posts %}
        <div class="post-card">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            <div class="post-date">{{ post.date | date: "%d/%m/%Y" }}</div>
            <p>{{ post.excerpt }}</p>
        </div>
    {% endfor %}
</div>
