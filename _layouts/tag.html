---
layout: default
---

<h1>Post tagged with: <span class="tag-highlight">#{{ page.tag }}</span></h1>

<div class="post-list">
    {% assign posts = site.tags[page.tag] %}
    {% for post in posts %}
        <div class="post-card">
            <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <div class="post-meta">
                {{ post.date | date: "%d/%m/%Y" }}
            </div>
            {{ post.excerpt }}
        </div>
    {% endfor %}
</div>
