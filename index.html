<div class="hero">
    <p>This blog is dedicated to sharing stories about appsec in general.</p>
</div>

<div class="terminal-container">
    <div class="terminal-bar">
        <div class="terminal-controls">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>
        root@pad1ryoshi ~ $ █
    </div>
    <div class="terminal-content">
        > whoami<br>
        appsec student<br><br>
        > ls /skills<br>

<section class="recent-posts">
    {% for post in site.posts limit:2 %}
        <div class="post-card">
            <h3><a href="{{ post.url }}" class="post-title">{{ post.title }}</a></h3>
            <div class="post-date">{{ post.date | date: "%d/%m/%Y" }}</div>
            {{ post.excerpt }}
        </div>
    {% endfor %}
</section>
